<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starworld Live Analytics</title>
    <style>
        body { font-family: sans-serif; background: #0b1420; color: #e0e6ed; padding: 20px; }
        .card { background: #1c2a3d; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .error { color: #ff6b6b; padding: 20px; border: 1px solid #ff6b6b; }
    </style>
</head>
<body>
    <h1>Live Analytics</h1>
    <div id="debug-log">Loading data...</div>
    <div id="game-container"></div>

    <script>
        // 1. Fetch the data file. Ensure the path is correct for your repo.
        fetch('./data/today_matchups.json')
            .then(res => {
                if (!res.ok) throw new Error("Could not find data/today_matchups.json");
                return res.json();
            })
            .then(data => {
                const debugLog = document.getElementById('debug-log');
                debugLog.style.display = 'none'; // Hide loading message
                
                // 2. Safely access the data structure
                const payload = data.payload || data; 
                const games = payload.data_points || [];
                
                const gameContainer = document.getElementById('game-container');
                gameContainer.innerHTML = games.map(game => `
                    <div class="card">
                        <h3>${game.awayTeam} vs ${game.homeTeam}</h3>
                        <p>Intensity Score: ${game.analytics?.intensity || 'N/A'}</p>
                    </div>
                `).join('');
            })
            .catch(err => {
                // 3. This will show the error on your phone screen if it fails
                document.getElementById('debug-log').innerHTML = 
                    `<div class="error">ERROR: ${err.message}. Please check if the file exists in the 'data' folder.</div>`;
            });
    </script>
</body>
</html>
