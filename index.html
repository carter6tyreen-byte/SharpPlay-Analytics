<!DOCTYPE html>
<html>
<head>
    <title>SharpPlay Analytics</title>
    <style>
        .matchup-table { width: 100%; border-collapse: collapse; }
        .matchup-table th, .matchup-table td { padding: 10px; border: 1px solid #ccc; }
        .green-bg { background-color: green; color: white; }
    </style>
</head>
<body>

    <div id="matchups-container"></div>

    <script>
        // THIS IS WHERE YOUR JAVASCRIPT GOES
        function getCellColor(value, threshold) {
            return value >= threshold ? 'green-bg' : '';
        }

        function renderMatchups(matchups) {
            const container = document.getElementById('matchups-container');
            container.innerHTML = `
                <table class="matchup-table">
                    <thead>
                        <tr>
                            <th>Matchup</th>
                            <th>Winner</th>
                            <th>Confidence</th>
                            <th>BarrelScore</th>
                        </tr>
                    </thead>
                    <tbody id="matchup-body"></tbody>
                </table>
            `;

            const tbody = document.getElementById('matchup-body');
            matchups.forEach(m => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${m.away_team} @ ${m.home_team}</td>
                    <td>${m.simulated_winner}</td>
                    <td>${m.win_probability}</td>
                    <td>${m.barrel_score || 'N/A'}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // Add your fetch logic here to call renderMatchups(data)
    </script>
</body>
</html>
