<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpPlay Analytics</title>
    </head>
<body>

    <header>
        <button class="theme-toggle-btn" id="theme-toggle">🌙 Dark Mode</button>
        <h1>SharpPlay Analytics</h1>
        <p>Predictive Modeling & Sports Simulations</p>
    </header>

    <div class="container">
        <div class="card">
            <h2 id="featured-title">Loading News...</h2>
            <p><strong id="featured-stat"></strong></p>
            <p id="featured-desc"></p>
        </div>

        <div class="card">
            <h2>Today's Projections</h2>
            <div class="update-stamp">Last Updated: <span id="update-time">Loading...</span></div>
            
            <div class="search-container">
                <input type="text" class="search-bar" id="search-input" placeholder="Search team names...">
            </div>

            <div class="matchup-grid" id="matchups-container">
                <p>Loading simulated matchups...</p>
            </div>
        </div>
    </div>

    <script>
        let allMatchups = [];

        // 1. Fetch data using a relative path from the root
        fetch('data/today_matchups.json', { cache: 'no-cache' })
            .then(response => {
                if (!response.ok) throw new Error('File not found');
                return response.json();
            })
            .then(data => {
                document.getElementById('update-time').innerText = data.last_updated;
                document.getElementById('featured-title').innerText = data.featured_story.title;
                document.getElementById('featured-stat').innerText = data.featured_story.stat;
                document.getElementById('featured-desc').innerText = data.featured_story.desc;

                allMatchups = data.matchups || [];
                renderMatchups(allMatchups);
            })
            .catch(err => {
                console.error("Fetch Error:", err);
                document.getElementById('matchups-container').innerHTML = 
                    '<p style="color: var(--text-muted);">No simulations currently available. System is online.</p>';
            });

        function renderMatchups(matchups) {
            const container = document.getElementById('matchups-container');
            container.innerHTML = '';

            if (matchups.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted);">No games scheduled for today.</p>';
                return;
            }

            matchups.forEach(matchup => {
                const card = document.createElement('div');
                card.className = 'matchup-card';
                card.innerHTML = `
                    <h3>${matchup.away_team} @ ${matchup.home_team}</h3>
                    <p><strong>Winner:</strong> ${matchup.simulated_winner}</p>
                    <div class="probability-badge">Confidence: ${matchup.win_probability}</div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
