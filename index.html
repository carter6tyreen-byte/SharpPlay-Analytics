<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starworld Debug Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #0b1420; color: #e0e6ed; padding: 20px; }
        pre { background: #1c2a3d; padding: 15px; border-radius: 8px; overflow: auto; }
        .error { color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Live Analytics Diagnostic</h1>
    <div id="output">Attempting to fetch data...</div>

    <script>
        const output = document.getElementById('output');
        
        // Fetch the JSON file
        fetch('./data/today_matchups.json')
            .then(res => {
                if (!res.ok) throw new Error("HTTP Status " + res.status);
                return res.json();
            })
            .then(data => {
                // If this runs, the file was found and is valid JSON
                output.innerHTML = "<h3>Data Found Successfully:</h3><pre>" + JSON.stringify(data, null, 2) + "</pre>";
            })
            .catch(err => {
                // If this runs, we know exactly why it's failing
                output.innerHTML = "<p class='error'>Fetch Error: " + err.message + "</p>" +
                                   "<p>Tip: Ensure 'data/today_matchups.json' is committed to the main branch.</p>";
            });
    </script>
</body>
</html>
