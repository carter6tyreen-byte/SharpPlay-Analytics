<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Analytics Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #0b1420; color: white; padding: 20px; }
        .card { background: #1c2a3d; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Live Analytics</h1>
    <div id="timestamp">Loading...</div>
    <div id="game-container"></div>

    <script>
        fetch('data/today_matchups.json')
            .then(res => res.json())
            .then(data => {
                // Accessing the new Unified Schema
                const meta = data.meta || {};
                const payload = data.payload || {};
                
                // Update Timestamp from meta
                document.getElementById('timestamp').innerText = "Last Updated: " + (meta.timestamp || "N/A");

                // Render Data Points from payload
                const container = document.getElementById('game-container');
                const games = payload.data_points || [];

                if (games.length === 0) {
                    container.innerHTML = "<p>No live games to display.</p>";
                    return;
                }

                container.innerHTML = games.map(game => `
                    <div class="card">
                        <h3>${game.awayTeam || 'Team A'} @ ${game.homeTeam || 'Team B'}</h3>
                        <p>Status: ${game.status || 'Active'}</p>
                    </div>
                `).join('');
            })
            .catch(err => {
                console.error("Fetch error:", err);
                document.getElementById('timestamp').innerText = "Data failed to load.";
            });
    </script>
</body>
</html>
