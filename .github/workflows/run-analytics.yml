name: Run Sports Analytics

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write # Gives GitHub Actions permission to commit files

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Data Collector
      run: python data/data_collector.py

    # Automatically saves and pushes the today_matchups.json file back to your repo
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add data/today_matchups.json
        git diff-index --quiet HEAD || git commit -m "Auto-updated MLB predictions data [skip ci]"
        git push