name: Run Sports Analytics

on:
  # Runs automatically every day at 8:00 AM UTC
  schedule:
    - cron: '0 8 * * *'
  # Allows you to manually trigger this from your phone's browser anytime
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your repository files
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up a Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-level: '3.10'

    # 3. Install any required libraries (if you have a requirements.txt)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Run your data collector script
    - name: Run Data Collector
      run: python data/data_collector.py

    # 5. Run your matchup simulation engine
    - name: Run Simulations
      run: python backend/main.py
