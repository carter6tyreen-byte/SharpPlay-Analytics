name: SharpPLAY Analytics Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas

      - name: Run Analytics Script
        # Files are in the root, so we remove the /analytics folder reference
        working-directory: .
        run: python main.py

      - name: Commit and push data
        env:
          TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git
          
          git fetch origin main
          git reset --hard origin/main
          
          # Since the file is in the root, we remove the analytics/ prefix here too
          git add analytics_data.json
          
          if ! git diff --quiet --exit-code; then
            git commit -m "Update analytics_data.json [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi
