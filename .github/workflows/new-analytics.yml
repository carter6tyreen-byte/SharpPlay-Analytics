      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Ensure pandas and requests are installed in the runner's environment
          pip install pandas requests

      - name: Run Pipeline
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          # This forces Python to look in the current directory for the 'src' package
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python main.py
