name: SharpPLAY Analytics Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Run Analytics Script
        # We run main.py directly because the runner is already in the folder
        run: |
          python main.py

      - name: Commit and push data
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # We add the file directly as it is generated in the current root
          git add analytics_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics_data.json [skip ci]" && git push)
      - name: Commit and push data
        env:
          TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git
          
          # Pull the latest changes to avoid "refused to push" errors
          git pull origin main --rebase
          
          git add analytics_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics_data.json [skip ci]" && git push)
