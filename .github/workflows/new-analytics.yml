on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run:
      - name: Upload result
        uses: actions/upload-artifact@v4

        with:
          name: stats-output
          path: output_file_name.json # Replace with the name of the file your script creates
      - name: Commit and push updated HTML
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add index.html
          git commit -m "Update MLB stats table"
          git push

