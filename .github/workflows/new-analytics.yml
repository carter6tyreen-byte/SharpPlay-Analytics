name: SharpPLAY Analytics Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Run Analytics Script
        run: |
          # Navigate into the nested folder before running the script
          cd SharpPlay-Analytics
          python main.py

      - name: Commit and push data
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # Ensure you point to the file in the correct location
          git add SharpPlay-Analytics/analytics_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics_data.json [skip ci]" && git push)
