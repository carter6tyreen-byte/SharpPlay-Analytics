name: SharpPLAY Analytics Pipeline

on:
  schedule:
    - cron: '0 8 * * *'  # Executes daily at 08:00 UTC
  push:
    branches:
      - main

jobs:
  update-dashboards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas streamlit
      
      - name: Generate Data
        run: python run_engine.py
      
      # This step builds the static index.html from your engine data
      - name: Build Static Value Board
        run: python generate_static_report.py
      
      # This step deploys the generated index.html to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
