name: update-stats

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Run Analytics Generation Script
        run: |
          # 1. Force the shell to the root of the workspace
          cd ${{ github.workspace }}
          
          # 2. Add current directory to PYTHONPATH so imports like 'analytics.machine_engine' work
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # 3. Explicitly execute the file located at the root
          python generate_static_report.py
          
          # 4. Fallback creation if the script doesn't generate the expected file
          if [ ! -f "data/player_distributions.json" ]; then
            mkdir -p data
            echo "{}" > data/player_distributions.json
          fi

      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/player_distributions.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics data [skip ci]" && git push)
