name: SharpPLAY Analytics Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # Runs at the top of every hour


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run python src/main.py
        env:
          # This forces Python to treat 'src' as the root package directory
          PYTHONPATH: ${{ github.workspace }}/src
        run: python src/main.py

      - name: Commit and push data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/
          git commit -m "Update data" || echo "No changes to commit"
          git push

      - name: Commit and push data
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # This adds the file generated by your pipeline
          git add analytics_data.json
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics_data.json [skip ci]" && git push)
