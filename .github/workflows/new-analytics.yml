name: update-stats

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Run Analytics Generation Script
        # Set PYTHONPATH to the root so the script can resolve imports
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Explicitly run from the root where the file is located
        run: python generate_static_report.py

      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/player_distributions.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update player distributions [skip ci]" && git push)
