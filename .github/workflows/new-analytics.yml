name: Daily MLB Prop Analytics Pipeline

on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 PM UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run static report generator
        run: |
          python generate_static_report.py

      - name: Commit and push updated report
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html || echo "No index.html to add"
          git commit -m "Auto-update daily MLB prop report" || echo "No changes to commit"
          git push
