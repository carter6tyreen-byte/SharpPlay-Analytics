name: STARWORLD Analytics Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests
      
      - name: Run Pipeline
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python main.py
        env:
          # This specifically maps secrets to environment variables 
          # just for this step, which is the most reliable way in GitHub Actions
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          API_HOST: ${{ secrets.API_HOST }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/today_matchups.json
          git commit -m "Auto-update: Refreshing live baseball stats" || exit 0
          git push
