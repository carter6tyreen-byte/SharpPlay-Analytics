name: STARWORLD Analytics Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Pipeline
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          API_HOST: ${{ secrets.API_HOST }}
          # This is the critical fix to resolve ModuleNotFoundError
          PYTHONPATH: ${{ github.workspace }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/today_matchups.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics data" && git push)
