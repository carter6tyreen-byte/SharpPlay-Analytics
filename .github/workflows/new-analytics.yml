name: update-stats

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Run Analytics Generation Script
        run: |
          # Try the nested directory first, then the root directory
          if [ -f "SharpPlay-Analytics/generate_static_report.py" ]; then
            cd SharpPlay-Analytics
            python generate_static_report.py
          elif [ -f "generate_static_report.py" ]; then
            python generate_static_report.py
          else
            echo "Error: generate_static_report.py not found in root or nested folder."
            exit 1
          fi

      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check both locations for a data directory to commit
          if [ -d "SharpPlay-Analytics/data" ]; then
            git add SharpPlay-Analytics/data/
          elif [ -d "data" ]; then
            git add data/
          fi
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics data [skip ci]" && git push)
