name: update-stats

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Run Analytics Generation Script
        run: |
          # Automatically find run_analytics.py anywhere in the repo
          SCRIPT_PATH=$(find . -name "run_analytics.py" | head -n 1)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: run_analytics.py not found!"
            find . -maxdepth 3
            exit 1
          fi
          
          echo "Executing script at: $SCRIPT_PATH"
          python "$SCRIPT_PATH"

      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Automatically find the data directory
          DATA_DIR=$(find . -type d -name "data" | head -n 1)
          
          if [ -d "$DATA_DIR" ]; then
            git add "$DATA_DIR"
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics data [skip ci]" && git push)
          else
            echo "No data directory found to commit."
          fi
