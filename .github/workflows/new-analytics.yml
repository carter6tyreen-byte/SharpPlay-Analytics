name: update-stats

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Run Analytics Generation Script
        run: |
          SCRIPT_PATH=$(find . -maxdepth 3 -name "generate_static_report.py" | head -n 1)
          echo "Found script at: $SCRIPT_PATH"
          python "$SCRIPT_PATH"
          
          if [ ! -f "data/player_distributions.json" ]; then
            echo "Script did not generate the file. Creating placeholder."
            mkdir -p data
            echo "{}" > data/player_distributions.json
          fi

      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/player_distributions.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics data [skip ci]" && git push)
