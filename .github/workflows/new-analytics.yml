      - name: Run Analytics Generation Script
        run: |
          # 1. Print all folders so we can see what is actually there
          echo "Listing current directory contents:"
          ls -F
          
          # 2. Find the script no matter where it is
          SCRIPT_PATH=$(find . -name "generate_static_report.py" -print -quit)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: Could not find generate_static_report.py"
            exit 1
          fi
          
          echo "Found script at: $SCRIPT_PATH"
          
          # 3. Run it using the path found
          python "$SCRIPT_PATH"
