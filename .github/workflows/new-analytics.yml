name: STARWORLD Analytics Pipeline
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Debug Structure
        run: ls -R  # This helps us identify the exact location of your files

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Pipeline
        # If your files are at the root, this will work. 
        # If 'ls -R' shows they are in a subfolder, we adjust this.
        run: python main.py 

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Auto-update pipeline data" || exit 0
          git push
