      - name: Run Pipeline
        env:
          MLB_API_KEY: ${{ secrets.MLB_API_KEY }}
        run: |
          # Dynamically find the directory containing main.py
          DATA_DIR=$(find . -type d -name "data" | head -n 1)
          
          if [ -z "$DATA_DIR" ]; then
            echo "Error: Could not find 'data' directory."
            exit 1
          fi
          
          echo "Found data directory at: $DATA_DIR"
          cd "$DATA_DIR"
          
          # Execute scripts
          python3 mlb_stats.py
          python3 main.py
