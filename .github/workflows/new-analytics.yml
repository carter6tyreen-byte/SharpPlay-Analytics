name: update-stats

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Run Analytics Generation Script
        run: |
          # 1. Print all folders so we can see what is actually there
          echo "Listing current directory contents:"
          ls -F
          
          # 2. Find the script no matter where it is
          SCRIPT_PATH=$(find . -name "generate_static_report.py" -print -quit)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: Could not find generate_static_report.py"
            exit 1
          fi
          
          echo "Found script at: $SCRIPT_PATH"
          
          # 3. Run it using the path found
          python "$SCRIPT_PATH"

      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Check if data directory exists and commit its contents
          if [ -d "data" ]; then
            git add data/
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics data [skip ci]" && git push)
          fi
