name: STARWORLD Analytics Pipeline
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: List files to find main.py
        run: ls -R

      - name: Run Pipeline
        # We will try running main.py directly from the root.
        # If this fails, the 'ls -R' above will show us the REAL folder name.
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Auto-update pipeline data" || exit 0
          git push
               - name: Run Pipeline
        run: |
          # Find the directory containing main.py and execute it
          MAIN_PATH=$(find . -name "main.py" -print -quit)
          python $MAIN_PATH
 
