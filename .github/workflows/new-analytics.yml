name: update-stats

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Run Analytics Generation Script
        # This dynamically locates the script regardless of nested folders
        run: |
          SCRIPT_PATH=$(find . -name "generate_static_report.py" | head -n 1)
          echo "Found script at: $SCRIPT_PATH"
          export PYTHONPATH=$PYTHONPATH:$(dirname "$SCRIPT_PATH")
          python "$SCRIPT_PATH"

      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Only attempt to commit if a data file was produced
          if [ -d "data" ]; then
            git add data/
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics data [skip ci]" && git push)
          fi
