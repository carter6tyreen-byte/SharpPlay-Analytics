name: update-stats

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy

      - name: Run Analytics Generation Script
        run: |
          # Recursively find the script path from the current directory
          SCRIPT_PATH=$(find . -type f -name "generate_static_report.py" | head -n 1)
          
          echo "Script located at: $SCRIPT_PATH"
          
          # Change to the directory containing the script to ensure local imports work
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          cd "$SCRIPT_DIR"
          
          # Run the script
          python "$(basename "$SCRIPT_PATH")"

      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # If data folder exists, commit the contents
          if [ -d "data" ]; then
            git add data/
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics data [skip ci]" && git push)
          fi
