name: STARWORLD Analytics Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Pipeline
        env:
          MLB_API_KEY: ${{ secrets.MLB_API_KEY }}
        # This navigates through the nested structure to reach your files
        run: |
          cd SharpPlay-Analytics/data
          python3 mlb_stats.py
          python3 main.py
