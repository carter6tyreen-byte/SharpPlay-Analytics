      - name: Run Pipeline
        run: |
          # Find the directory containing main.py
          MAIN_PATH=$(find . -name "main.py" -print -quit)
          # Get the directory of that file
          MAIN_DIR=$(dirname "$MAIN_PATH")
          # Run python from the root of the repo, pointing to that file
          export PYTHONPATH=$PYTHONPATH:.
          python $MAIN_PATH
