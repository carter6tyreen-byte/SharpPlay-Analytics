name: STARWORLD Analytics Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Stage 1 & 2 - Data Ingestion
        env:
          MLB_API_KEY: ${{ secrets.MLB_API_KEY }}
        run: python3 mlb_stats.py

      - name: Run Stage 5 (Quantum Consensus Audit)
        run: python3 main.py
