name: STARWORLD Analytics Pipeline

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Data Ingestion
        env:
          MLB_API_KEY: ${{ secrets.MLB_API_KEY }}
        run: python3 data/mlb_stats.py
      - name: Audit
        run: python3 data/main.py
