name: STARWORLD Analytics Pipeline
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Pipeline
        run: |
          # PYTHONPATH ensures Python finds modules in the root directory
          export PYTHONPATH=$PYTHONPATH:.
          python main.py
        env:
          # These map the GitHub Secrets to the environment variables your code uses
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          API_HOST: ${{ secrets.API_HOST }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          # Only add/commit the JSON file to keep repo clean
          git add data/today_matchups.json
          git commit -m "Auto-update: Refreshing live baseball stats" || exit 0
          git push
