name: SharpPLAY Analytics Pipeline

# 1. Required permissions to push files back to the repo
permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas  # Add other requirements here if needed

      - name: Run Analytics Script
        run: |
          python main.py  # Ensure this creates 'analytics_data.json' in the root

      - name: Commit and push data
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add analytics_data.json
          # Check for changes, commit if they exist, and push
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update analytics_data.json [skip ci]" && git push)
