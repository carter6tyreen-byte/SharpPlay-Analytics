      - name: Run Analytics Generation Script
        run: |
          # 1. Use 'find' to locate the file, defaulting to root if not found in a subfolder
          SCRIPT_PATH=$(find . -maxdepth 3 -name "generate_static_report.py" | head -n 1)
          
          echo "Found script at: $SCRIPT_PATH"
          
          # 2. Run the script using the path found by the system
          python "$SCRIPT_PATH"
          
          # 3. Create the data file if the script failed to do so (to prevent further errors)
          if [ ! -f "data/player_distributions.json" ]; then
            echo "Script did not generate the file. Creating placeholder for stability."
            mkdir -p data
            echo "{}" > data/player_distributions.json
          fi
