      - name: Run Analytics Generation Script
        run: |
          echo "Current directory:"
          pwd
          echo "Full file list (recursive):"
          find . -maxdepth 3 -name "*.py"
          
          # Proceed to run if found
          FILE=$(find . -name "generate_static_report.py" | head -n 1)
          if [ -f "$FILE" ]; then
            python "$FILE"
          else
            echo "Error: Still could not locate generate_static_report.py"
            exit 1
          fi
