name: Run Analytics Generation Pipeline

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas requests

      - name: Verify Environment Setup
        run: |
          python -c "import streamlit, pandas, requests; print('Dependencies verified successfully')"

      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --cached --quiet || (git commit -m "Auto-update verified data workflow [skip ci]" && git push)
