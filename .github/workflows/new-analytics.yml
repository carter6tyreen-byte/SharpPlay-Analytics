name: STARWORLD Analytics Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Added this so you can trigger it manually to test

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests
      
      - name: Run Pipeline
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python main.py
        env:
          # Mapping them here explicitly
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          API_HOST: ${{ secrets.API_HOST }}
