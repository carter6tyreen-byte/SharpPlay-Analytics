name: STARWORLD Analytics Pipeline
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Pipeline
        run: |
          # Set the PYTHONPATH so modules in current dir can be imported
          export PYTHONPATH=$PYTHONPATH:.
          python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/today_matchups.json
          git commit -m "Auto-update pipeline data" || exit 0
          git push
