on:
  schedule:
    # Runs daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual triggers for testing

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests streamlit

      - name: Run Analytics Generation Script
        run: python generate_static_report.py

      - name: Commit and push updates
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Update MLB pitcher and batter analytics" || echo "No changes to commit"
          git push

      - name: Commit and push updates
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Update MLB pitcher and batter analytics" || echo "No changes to commit"
          git push
