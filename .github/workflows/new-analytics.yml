name: SharpPLAY Analytics Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Analytics Script
        run: |
          python $(find . -name "main.py" | head -n 1)

      - name: Commit and push data
        env:
          TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git
          git fetch origin main
          git reset --hard origin/main
          
          # Force-add the correct file expected by app.py
          find . -name "today_matchups.json" -exec git add -f {} +
          
          if ! git diff --quiet --exit-code; then
            git commit -m "Update today_matchups.json [skip ci]"
            git push origin main
          else
            echo "No changes found to commit."
          fi
