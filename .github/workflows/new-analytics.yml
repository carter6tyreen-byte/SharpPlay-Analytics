name: Deploy and Audit SharpPLAY

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *' # Runs daily at 8:00 AM UTC

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run System Health and Brier Audit
        run: |
          python audit/system_health.py
          python audit/calculate_brier.py

      - name: Commit Audit Logs Back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/system_health_log.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update system health and performance audit logs [skip ci]" && git push)
