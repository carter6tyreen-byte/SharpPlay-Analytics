name: STARWORLD Analytics Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Pipeline Stage 1 & 2
        # This executes the mlb_stats script we fixed
        run: python mlb_stats.py

      - name: Run Quantum Consensus Audit
        # This executes your audit gate after the solver runs
        run: python main.py
